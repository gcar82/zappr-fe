        <script>
            (function () {
                const NativeXHR = window.XMLHttpRequest;

                window.XMLHttpRequest = new Proxy(NativeXHR, {
                    construct(target, args) {
                        const xhr = new target(...args);

                        return new Proxy(xhr, {
                            get(obj, prop) {
                                if (prop === "status") return obj.status === 405 ? 200 : obj.status;
                                if (prop === "open") {
                                    return function (method, url, ...rest) {
                                        if (/^https:\/\/rai[a-z]+[0-9]{1}-live\.akamaized\.net/g.test(url) && !/^https:\/\/raievent[0-9]{1,2}-live\.akamaized\.net/g.test(url) && !/^https:\/\/radio[a-z]+-live\.akamaized\.net/g.test(url) && new URL(url).searchParams.get("aka_me_session_id") === null) {
                                            if (zappr.raiAkamai.expiration - (Date.now() / 1000) <= 15) {
                                                fetch(`${window["zappr"].config.backend.host["alwaysdata"]}/rai-akamai`, { method: "POST" })
                                                    .then(response => response.json())
                                                    .then(authData => {
                                                        window.zappr.raiAkamai = {
                                                            ...authData,
                                                            expiration: parseInt(new URLSearchParams(authData.auth).get("hdnea").split("~").filter(el => el.startsWith("exp"))[0].split("=")[1])
                                                        };
                                                    });
                                            };
                                            let urlSearch = new URL(url).searchParams;
                                            urlSearch.set("hdnea", new URLSearchParams(zappr.raiAkamai.auth).get("hdnea"));
                                            url = `${url.replace(new URL(url).search, "")}?${urlSearch}`;
                                            if (/media_.*([0-9]+)\.ts/.test(new URL(url).pathname.split("/").filter(el => el).slice(-1)[0])) url += `&aka_me_session_id=${encodeURI(zappr.raiAkamai.sessionID)}&aka_msn=${parseInt(new URL(url).pathname.split("/").filter(el => el).slice(-1)[0].replaceAll(/\D+/g, ""))}&aka_hls_version=3&aka_media_format_type=hls`;
                                        };
                                        if (/^https:\/\/rai[a-z]+[0-9]{1}-live\.akamaized\.net/g.test(url)) url += `&_=${Date.now()}`;
                                        return obj.open(method, url, ...rest);
                                    };
                                };

                                const val = obj[prop];
                                return typeof val === "function" ? val.bind(obj) : val;
                            },
                            set(obj, prop, value) {
                                obj[prop] = value;
                                return true;
                            }
                        });
                    }
                });
            })();
        </script>

        <script>
            (function () {
                const NativeXHR = window.XMLHttpRequest;

                window.XMLHttpRequest = new Proxy(NativeXHR, {
                    construct(target, args) {
                        const xhr = new target(...args);

                        return new Proxy(xhr, {
                            get(obj, prop) {
                                if (prop === "open") {
                                    return function (method, url, ...rest) {
                                        if (url.startsWith("https://prod-kami.wuaki.tv/v1/licensing/aes128/")) url = `https://api.zappr.stream/rakuten-licensing/${new URL(url).searchParams.get("uuid")}`;
                                        return obj.open(method, url, ...rest);
                                    };
                                };

                                const val = obj[prop];
                                return typeof val === "function" ? val.bind(obj) : val;
                            },
                            set(obj, prop, value) {
                                obj[prop] = value;
                                return true;
                            }
                        });
                    }
                });
            })();
        </script>
